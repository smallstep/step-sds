name: Add Issues and PRs to Triage

on:
  issues:
    types:
      - opened
      - reopened
  pull_request_target:
    types:
      - opened
      - reopened

jobs:
  triage:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: smallstep/workflows/.github/workflows/triage.yml@main
    secrets: inherit
